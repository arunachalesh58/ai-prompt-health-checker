<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PromptHealth — Create Account</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #18181f;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f5;
    --muted: #7a7a8a;
    --accent: #6c63ff;
    --accent2: #a78bfa;
    --green: #22c55e;
    --red: #ef4444;
    --mono: 'DM Mono', monospace;
    --display: 'Syne', sans-serif;
    --body: 'DM Sans', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--body);
    font-size: 15px;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,99,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,99,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    top: -200px;
    left: 50%;
    transform: translateX(-50%);
    width: 700px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(108,99,255,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .card {
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border2);
    border-radius: 20px;
    padding: 40px 36px;
    box-shadow: 0 0 60px rgba(108,99,255,0.08);
  }
  .logo {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 28px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .logo-text {
    font-family: var(--display);
    font-size: 18px;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  h1 {
    font-family: var(--display);
    font-size: 26px;
    font-weight: 700;
    letter-spacing: -0.02em;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 14px;
    color: var(--muted);
    margin-bottom: 28px;
    font-weight: 300;
  }
  .subtitle a { color: var(--accent2); text-decoration: none; }
  .subtitle a:hover { text-decoration: underline; }

  .sso-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 20px;
  }
  .sso-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 11px 14px;
    border-radius: 10px;
    border: 1px solid var(--border2);
    background: var(--surface2);
    color: var(--text);
    font-family: var(--body);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }
  .sso-btn:hover { border-color: var(--accent); background: rgba(108,99,255,0.06); }
  .sso-btn svg { width: 16px; height: 16px; flex-shrink: 0; }
  .sso-github { grid-column: 1 / -1; }

  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  .divider-text { font-size: 12px; color: var(--muted); font-family: var(--mono); }

  .field { margin-bottom: 14px; }
  .field label {
    display: block;
    font-size: 12px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border2);
    border-radius: 10px;
    color: var(--text);
    font-family: var(--body);
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  .password-hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 5px;
    font-family: var(--mono);
  }

  .terms {
    font-size: 12px;
    color: var(--muted);
    margin-bottom: 18px;
    line-height: 1.5;
    font-weight: 300;
  }

  .submit-btn {
    width: 100%;
    padding: 13px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: #fff;
    font-family: var(--display);
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 0.01em;
  }
  .submit-btn:hover { background: #5a52e0; transform: translateY(-1px); }
  .submit-btn:active { transform: translateY(0); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

  .error-box {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(239,68,68,0.1);
    border: 1px solid rgba(239,68,68,0.3);
    color: #fca5a5;
    font-size: 12px;
    font-family: var(--mono);
  }
  .error-box.show { display: block; }

  .success-box {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    background: rgba(34,197,94,0.1);
    border: 1px solid rgba(34,197,94,0.3);
    color: #86efac;
    font-size: 12px;
    font-family: var(--mono);
  }
  .success-box.show { display: block; }

  .verify-section {
    display: none;
    margin-top: 20px;
  }
  .verify-section.show { display: block; }
  .verify-section p {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 12px;
    line-height: 1.5;
  }

  .spinner {
    display: none;
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .submit-btn.loading .btn-text { display: none; }
  .submit-btn.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <span class="logo-dot"></span>
    <span class="logo-text">PromptHealth</span>
  </div>

  <h1>Create account</h1>
  <p class="subtitle">Already have an account? <a href="login.html">Sign in</a></p>

  <div class="sso-grid">
    <button class="sso-btn" onclick="signUpWithGoogle()">
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>
    <button class="sso-btn" onclick="signUpWithGitHub()">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z"/>
      </svg>
      GitHub
    </button>
  </div>

  <div class="divider">
    <div class="divider-line"></div>
    <span class="divider-text">or sign up with email</span>
    <div class="divider-line"></div>
  </div>

  <div id="signupForm">
    <div class="field">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email"/>
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="new-password"/>
      <div class="password-hint">Min 8 characters · uppercase · number · symbol</div>
    </div>
    <div class="field" style="margin-bottom:20px">
      <label>Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="••••••••" autocomplete="new-password"/>
    </div>

    <button class="submit-btn" id="signupBtn" onclick="signUp()">
      <span class="btn-text">Create account</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="verify-section" id="verifySection">
    <p>We sent a 6-digit verification code to your email. Enter it below to confirm your account.</p>
    <div class="field">
      <label>Verification code</label>
      <input type="text" id="verifyCode" placeholder="123456" maxlength="6" autocomplete="one-time-code"/>
    </div>
    <button class="submit-btn" id="verifyBtn" onclick="verifyCode()">
      <span class="btn-text">Verify email</span>
      <div class="spinner"></div>
    </button>
  </div>

  <div class="error-box" id="errorBox"></div>
  <div class="success-box" id="successBox"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6/dist/amazon-cognito-identity.min.js"></script>
<script src="auth.js"></script>
<script>
let pendingEmail = '';

async function signUp() {
  const email = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value;
  const confirmPassword = document.getElementById('confirmPassword').value;
  const btn = document.getElementById('signupBtn');

  document.getElementById('errorBox').classList.remove('show');
  document.getElementById('successBox').classList.remove('show');

  if (!email || !password || !confirmPassword) {
    showError('Please fill in all fields.');
    return;
  }
  if (password !== confirmPassword) {
    showError('Passwords do not match.');
    return;
  }
  if (password.length < 8) {
    showError('Password must be at least 8 characters.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    await cognitoSignUp(email, password);
    pendingEmail = email;
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('verifySection').classList.add('show');
    showSuccess('Check your email for the verification code.');
  } catch (err) {
    showError(err.message || 'Sign up failed. Please try again.');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

async function verifyCode() {
  const code = document.getElementById('verifyCode').value.trim();
  const btn = document.getElementById('verifyBtn');

  document.getElementById('errorBox').classList.remove('show');

  if (!code) {
    showError('Please enter the verification code.');
    return;
  }

  btn.disabled = true;
  btn.classList.add('loading');

  try {
    await cognitoConfirm(pendingEmail, code);
    showSuccess('Email verified! Redirecting to sign in...');
    setTimeout(() => window.location.href = 'login.html', 1500);
  } catch (err) {
    showError(err.message || 'Invalid code. Please try again.');
  } finally {
    btn.disabled = false;
    btn.classList.remove('loading');
  }
}

function showError(msg) {
  const box = document.getElementById('errorBox');
  box.textContent = msg;
  box.classList.add('show');
}

function showSuccess(msg) {
  const box = document.getElementById('successBox');
  box.textContent = msg;
  box.classList.add('show');
}

function signUpWithGoogle() { window.location.href = getCognitoOAuthURL('Google'); }
function signUpWithGitHub() { window.location.href = getCognitoOAuthURL('GitHub'); }
</script>
</body>
</html>
